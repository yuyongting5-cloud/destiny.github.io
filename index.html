<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>All About Destiny</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;900&display=swap" rel="stylesheet">
  <style>
    body { background: #fff; font-family: 'Noto Serif SC', serif; overflow-x: hidden; }
    .scrap-item { position: absolute; transition: 0.3s; z-index: 10; }
    .delete-mark { position: absolute; bottom: -10px; right: -10px; width: 22px; height: 22px; background: #000; color: #fff; border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #fff; }
    .scrap-item:hover .delete-mark { display: flex; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 1000; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div id="syncStatus" style="position:fixed; top:10px; right:10px; font-size:10px; color:#ccc;">Connecting...</div>

  <header class="min-h-screen flex flex-col items-center justify-center">
    <h1 class="text-9xl font-light tracking-tighter">DESTINY.</h1>
    <p class="italic opacity-50 mt-4">"one thing i can tell you is you got to be free"</p>
  </header>

  <section id="scrapbook" style="position:relative; min-height:150vh; background:#fafafa;">
    <div class="p-10 flex gap-4">
      <button onclick="openModal('text')" class="border border-black px-4 py-1 text-xs">+ TEXT</button>
      <button onclick="openModal('img')" class="border border-black px-4 py-1 text-xs">+ IMAGE</button>
    </div>
  </section>

  <div id="globalModal" class="modal">
    <div class="text-center w-80">
      <textarea id="modalInput" class="w-full h-32 border-b border-black outline-none p-2 bg-transparent" placeholder="输入内容..."></textarea>
      <div class="mt-4 flex justify-between">
        <button onclick="closeModal()">取消</button>
        <button onclick="saveContent()" class="font-bold">确认保存</button>
      </div>
    </div>
  </div>

  <script>
    const _supabase = supabase.createClient("https://ykymzuaobitdhoyyqmxp.supabase.co", "sb_publishable_mU8Ivr3GpGOjugg2TxK5Jw_FCRxbtpS");
    const MASTER_CODE = "2026";
    let db = { customScraps: [], deletedInitials: [] };

    // 你消失的照片和文字，我都找回来放在这里了！
    const initialScraps = [
      { id:'s1', type:'text', content:'每次出门都幻想自己会阅读。每次都带着书出门带着没电的手机和没翻开的书。好吧', x:80, y:200 },
      { id:'s2', type:'text', content:'I\'m trying to go on this path But you say I haven\' t get the jests', x:500, y:120 },
      { id:'s3', type:'text', content:'这个世界大概在我十七岁的时候就毁灭了，现在的每一天都只是我的幻觉。', x:120, y:500 },
      { id:'s4', type:'text', content:'手裡有打開門的鑰匙但我得承認我只喜欢在生命的房间开一扇窗', x:400, y:750 },
      { id:'s5', type:'img', content:'https://i.ibb.co/jZvfc09z/IMG-5712.jpg', x:650, y:350 },
      { id:'s6', type:'img', content:'https://i.ibb.co/mFGz0qmf/IMG-7532.jpg', x:180, y:900 },
      { id:'s7', type:'img', content:'https://i.ibb.co/PskfMxGg/IMG-5116.jpg', x:750, y:850 },
      { id:'s8', type:'img', content:'https://i.ibb.co/BVZJFbZB/IMG-1072.jpg', x:80, y:1100 }
    ];

    async function load() {
      const { data } = await _supabase.from('archive_data').select('content').eq('id', 1).single();
      if (data) db = data.content;
      render();
      document.getElementById('syncStatus').innerText = "Cloud: Connected";
    }

    function render() {
      const container = document.getElementById('scrapbook');
      container.querySelectorAll('.scrap-item').forEach(el => el.remove());
      
      // 渲染初始内容
      initialScraps.forEach(s => {
        if(!db.deletedInitials.includes(s.id)) renderOne(s, true);
      });
      // 渲染新加内容
      db.customScraps.forEach((s, i) => renderOne(s, false, i));
    }

    function renderOne(s, isInit, idx) {
      const div = document.createElement('div');
      div.className = 'scrap-item';
      div.style.left = s.x + 'px'; div.style.top = s.y + 'px';
      div.innerHTML = (s.type === 'text' ? `<div class="bg-white p-4 shadow-xl border max-w-xs">${s.content}</div>` : `<img src="${s.content}" class="w-64 shadow-2xl">`) + 
                      `<div class="delete-mark" onclick="del(${isInit}, '${isInit?s.id:idx}')">×</div>`;
      document.getElementById('scrapbook').appendChild(div);
    }

    function openModal(m) { window.mode = m; document.getElementById('globalModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('globalModal').style.display = 'none'; }

    async function saveContent() {
      const pw = prompt("请输入暗号 2026:");
      if(pw !== MASTER_CODE) return alert("暗号不对哦");
      
      const val = document.getElementById('modalInput').value;
      db.customScraps.push({ type: window.mode, content: val, x: Math.random()*500, y: Math.random()*800 + 200 });
      await _supabase.from('archive_data').upsert({ id: 1, content: db });
      render(); closeModal();
    }

    window.del = async (isInit, key) => {
      const pw = prompt("删除也需要暗号:");
      if(pw !== MASTER_CODE) return;
      if(isInit) db.deletedInitials.push(key);
      else db.customScraps.splice(key, 1);
      await _supabase.from('archive_data').upsert({ id: 1, content: db });
      render();
    };

    load();
  </script>
</body>
</html>
