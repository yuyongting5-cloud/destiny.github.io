<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All About Destiny | Final Cloud Archive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;500;900&display=swap" rel="stylesheet">
  <style>
    body { background-color: #fff; color: #000; font-family: 'Noto Serif SC', serif; overflow-x: hidden; scroll-behavior: smooth; }
    .star-outline { position: absolute; top: 10%; left: 20%; width: 65vw; opacity: 0.08; z-index: -1; pointer-events: none; transition: transform 0.1s ease-out; }
    .album-vertical-list { height: 650px; overflow-y: auto; scrollbar-width: none; perspective: 1000px; padding: 40px 0; }
    .album-item { cursor: pointer; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); filter: grayscale(100%); opacity: 0.2; margin-bottom: 40px; }
    .album-item:nth-child(even) { transform: translateX(30px); }
    .album-item:nth-child(odd) { transform: translateX(-15px); }
    .album-item:hover { filter: grayscale(0%); opacity: 1; transform: scale(1.1) rotate(3deg) !important; z-index: 10; }
    .album-item.active { filter: grayscale(0%); opacity: 1; transform: translateX(20px) scale(1.05) !important; box-shadow: 20px 20px 60px rgba(0,0,0,0.1); }
    .scrapbook-section { position: relative; min-height: 160vh; width: 100%; border-top: 1px solid #eee; border-bottom: 1px solid #eee; background: #fafafa; overflow: hidden; }
    .scrap-item { position: absolute; transition: transform 0.3s; z-index: 10; }
    .delete-mark { position: absolute; bottom: -10px; right: -10px; width: 22px; height: 22px; background: #000; color: #fff; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; z-index: 100; border: 2px solid #fff; }
    .scrap-item:hover .delete-mark { display: flex; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); z-index: 1000; align-items: center; justify-content: center; }
    #syncStatus { position: fixed; top: 10px; right: 10px; font-size: 10px; color: #ccc; z-index: 2000; font-family: monospace; }
  </style>
</head>
<body>

  <div id="syncStatus">Cloud: Connecting...</div>

  <header class="min-h-screen flex flex-col md:flex-row items-center justify-center px-10 md:px-24">
    <div class="flex-1 z-10">
      <h1 class="text-[clamp(3rem,12vw,9rem)] font-light leading-[0.9]">ALL ABOUT<br>DESTINY.</h1>
      <p class="mt-14 text-2xl md:text-4xl italic opacity-60">"one thing i can tell you is you got to be free"</p>
    </div>
    <div class="flex-1 flex justify-center md:justify-end mt-12 md:mt-0">
      <img src="https://i.ibb.co/m58hqtc6/IMG-6823.jpg" class="w-64 md:w-96 shadow-2xl rotate-2">
    </div>
  </header>

  <section class="py-40 px-10 md:px-24 flex flex-col md:flex-row gap-20 items-center">
    <div class="w-full md:w-[40%] album-vertical-list" id="albumList"></div>
    <div class="flex-1 relative">
      <div id="albumDetail" class="opacity-0 transition-opacity duration-500">
        <h3 id="detailTitle" class="text-5xl font-black mb-2 tracking-tighter"></h3>
        <p id="detailSongs" class="text-xs opacity-30 mb-10 uppercase tracking-widest"></p>
        <div id="albumLyricContainer" class="space-y-6"></div>
      </div>
    </div>
  </section>

  <section class="scrapbook-section" id="scrapbook">
    <div class="absolute top-10 left-10 z-[100] flex gap-4">
      <button onclick="openModal('scrapText')" class="bg-black text-white text-[10px] px-6 py-2 uppercase tracking-widest">+ Text</button>
      <button onclick="openModal('scrapImage')" class="bg-black text-white text-[10px] px-6 py-2 uppercase tracking-widest">+ Image URL</button>
    </div>
  </section>

  <div id="globalModal" class="modal">
    <div class="modal-content text-center w-full max-w-lg px-6">
      <h4 id="modalType" class="text-[10px] uppercase tracking-widest mb-6 opacity-30">Archive Entry</h4>
      <textarea id="modalInput" class="w-full h-40 border-b border-black outline-none p-4 text-xl bg-transparent resize-none" placeholder="Write here..."></textarea>
      <div class="mt-8 flex justify-center gap-10">
        <button onclick="closeModal()" class="uppercase text-xs tracking-widest">Cancel</button>
        <button onclick="saveContent()" class="uppercase text-xs font-bold underline tracking-widest">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    // --- 🔑 核心配置 (已填入你的钥匙) ---
    const SB_URL = "https://ykymzuaobitdhoyyqmxp.supabase.co";
    const SB_KEY = "sb_publishable_mU8Ivr3GpGOjugg2TxK5Jw_FCRxbtpS"; 
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let db = { customScraps: [], albumLyrics: {} };

    // 专辑静态数据
    const albums = [
      { id:1, name: 'EndSerenading', img: 'https://i.ibb.co/7dM4QCx4/IMG-6823.jpg', songs: 'Mineral / 1998' },
      { id:2, name: '我们的灵魂乐', img: 'https://i.ibb.co/pB7Wvb7D/IMG-6824.jpg', songs: '透明杂志' },
      { id:3, name: '亲爱的…我还不知道', img: 'https://i.ibb.co/pBHns4Yd/IMG-6821.jpg', songs: '张悬 / 2007' }
    ];

    // 初始化加载
    async function load() {
        const { data } = await _supabase.from('archive_data').select('content').eq('id', 1).single();
        if (data) db = data.content;
        renderEverything();
        document.getElementById('syncStatus').innerText = "Cloud: Connected";
    }

    async function sync() {
        document.getElementById('syncStatus').innerText = "Syncing...";
        await _supabase.from('archive_data').upsert({ id: 1, content: db });
        document.getElementById('syncStatus').innerText = "Saved";
    }

    function renderEverything() {
        // 渲染专辑
        const listEl = document.getElementById('albumList');
        listEl.innerHTML = '';
        albums.forEach((alb) => {
            const div = document.createElement('div');
            div.className = 'album-item';
            div.innerHTML = `<img src="${alb.img}" class="w-full shadow-lg">`;
            div.onclick = () => {
                document.getElementById('detailTitle').innerText = alb.name;
                document.getElementById('detailSongs').innerText = alb.songs;
                document.getElementById('albumDetail').style.opacity = 1;
            };
            listEl.appendChild(div);
        });

        // 渲染碎片
        const container = document.getElementById('scrapbook');
        container.querySelectorAll('.scrap-item').forEach(i => i.remove());
        db.customScraps.forEach((s, idx) => {
            const div = document.createElement('div');
            div.className = 'scrap-item group';
            div.style.left = s.x + 'px'; div.style.top = s.y + 'px';
            div.style.transform = `rotate(${s.rot}deg)`;
            div.innerHTML = (s.type === 'text' ? `<div class="bg-white p-6 shadow-xl border border-black/5 max-w-sm text-xl font-light">${s.content}</div>` : `<img src="${s.content}" class="w-64 md:w-80 shadow-2xl">`) + 
                            `<div class="delete-mark" onclick="del(${idx})">×</div>`;
            container.appendChild(div);
        });
    }

    let currentMode = '';
    function openModal(m) { currentMode = m; document.getElementById('globalModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('globalModal').style.display = 'none'; }
    
    async function saveContent() {
        const val = document.getElementById('modalInput').value;
        if(!val) return;
        db.customScraps.push({ 
            type: currentMode==='scrapText'?'text':'img', 
            content: val, 
            x: Math.random()*(window.innerWidth-300), 
            y: Math.random()*800 + 100,
            rot: Math.random()*10 - 5
        });
        renderEverything(); await sync(); closeModal();
        document.getElementById('modalInput').value = '';
    }

    async function del(idx) { 
        event.stopPropagation();
        db.customScraps.splice(idx,1); 
        renderEverything(); 
        await sync(); 
    }

    window.onload = load;
  </script>
</body>
</html>
